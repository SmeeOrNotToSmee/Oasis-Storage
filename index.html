<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oasis Items Tracker</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/rmG38G4L/Oasisnobg.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sand: #0A0E27;
    --sand-dark: #2E3768;
    --clay: #FF7A45;
    --clay-dark: #E0602A;
    --ink: #EAF0FF;
    --teal: #3FA9F5;
    --teal-dark: #1E6FA8;
    --mint: #BFE3FF;
    --card: #141A3D;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--sand);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
  }

  header.banner{
    position:relative;
    background:linear-gradient(180deg, #2a2166 0%, #1a1f4d 55%, var(--sand) 100%);
    color:var(--mint);
    padding:2.6rem 1.5rem 3.4rem;
    text-align:center;
    overflow:hidden;
  }

  header.banner .banner-logo{
    width:110px;
    height:110px;
    object-fit:contain;
    display:block;
    margin:0 auto 0.8rem;
    position:relative;
    z-index:2;
    filter:drop-shadow(0 0 18px rgba(63,169,245,0.45));
  }

  header.banner h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(2rem, 5vw, 3.2rem);
    letter-spacing:0.02em;
    margin:0;
    position:relative;
    z-index:2;
  }

  header.banner p.tagline{
    margin:0.5rem 0 0;
    font-size:0.95rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--mint);
    position:relative;
    z-index:2;
  }

  .dune{
    position:absolute;
    bottom:-1px; left:0; right:0;
    height:48px;
    background:var(--sand);
    -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 60' preserveAspectRatio='none'><path d='M0,40 C150,10 300,55 450,30 C600,5 750,55 900,25 C1050,0 1150,35 1200,20 L1200,60 L0,60 Z'/></svg>");
    mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 60' preserveAspectRatio='none'><path d='M0,40 C150,10 300,55 450,30 C600,5 750,55 900,25 C1050,0 1150,35 1200,20 L1200,60 L0,60 Z'/></svg>");
    -webkit-mask-size:100% 100%;
    mask-size:100% 100%;
  }

  main{
    max-width:960px;
    margin:0 auto;
    padding:0 1.5rem 4rem;
  }

  nav.tabs{
    display:flex;
    gap:0.5rem;
    margin-top:1.6rem;
    border-bottom:2px solid var(--sand-dark);
    flex-wrap:wrap;
  }

  nav.tabs button{
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    background:none;
    border:none;
    padding:0.85rem 1.1rem;
    color:#8CA0D9;
    cursor:pointer;
    position:relative;
    top:2px;
    transition:color 0.2s ease;
  }

  nav.tabs button:hover{ color:var(--clay-dark); }

  nav.tabs button.active{
    color:var(--ink);
    border-bottom:3px solid var(--clay);
  }

  section.panel{
    display:none;
    padding-top:1.8rem;
    animation:fade 0.25s ease;
  }
  section.panel.active{ display:block; }

  @keyframes fade{
    from{ opacity:0; transform:translateY(4px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .panel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:1.2rem;
  }

  .panel-head h2{
    font-family:'Fraunces', serif;
    font-size:1.4rem;
    margin:0;
  }

  button.add-btn{
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:600;
    font-size:0.9rem;
    background:var(--clay);
    color:#fff;
    border:none;
    padding:0.6rem 1rem;
    border-radius:6px;
    cursor:pointer;
    transition:background 0.2s ease, transform 0.1s ease;
  }
  button.add-btn:hover{ background:var(--clay-dark); }
  button.add-btn:active{ transform:scale(0.97); }

  .categories{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:1rem;
  }

  .category{
    background:var(--card);
    border:1px solid var(--sand-dark);
    border-radius:10px;
    padding:1rem 1.1rem 1.2rem;
  }

  .category-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:0.6rem;
  }

  .category-top h3{
    font-family:'Fraunces', serif;
    font-size:1.05rem;
    margin:0;
    word-break:break-word;
  }

  .icon-btn{
    background:none;
    border:none;
    cursor:pointer;
    color:#8C9BD9;
    font-size:1rem;
    line-height:1;
    padding:0.15rem 0.3rem;
  }
  .icon-btn:hover{ color:var(--clay-dark); }

  .items{
    list-style:none;
    margin:0 0 0.6rem;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:0.4rem;
  }

  .items li{
    display:flex;
    align-items:center;
    gap:0.5rem;
    font-size:0.9rem;
    color:var(--ink);
  }

  .items li input[type="checkbox"]{
    accent-color:var(--teal);
  }

  .items li.done span{
    text-decoration:line-through;
    color:#6A78A8;
  }

  .item-form{
    display:flex;
    gap:0.4rem;
  }

  .item-form input{
    flex:1;
    border:1px solid var(--sand-dark);
    border-radius:6px;
    padding:0.4rem 0.5rem;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:0.85rem;
    color:var(--teal-dark);
    background:#fff;
  }

  .item-form button{
    border:none;
    background:var(--teal);
    color:#fff;
    border-radius:6px;
    padding:0.4rem 0.7rem;
    font-size:0.85rem;
    cursor:pointer;
  }
  .item-form button:hover{ background:var(--teal-dark); }

  .empty-state{
    color:#7C88B8;
    font-size:0.9rem;
    padding:1.2rem 0;
    text-align:center;
    border:1px dashed var(--sand-dark);
    border-radius:10px;
  }

  .item-pill-grid{
    display:flex;
    flex-wrap:wrap;
    gap:0.7rem;
  }

  .location-item-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:0.9rem;
  }

  @media (max-width:600px){
    .location-item-grid{
      grid-template-columns:repeat(2, 1fr);
    }
  }

  .location-item-card{
    display:flex;
    flex-direction:column;
    gap:0.6rem;
    background:var(--card);
    border:1px solid var(--sand-dark);
    border-radius:12px;
    padding:0.8rem 0.9rem;
  }

  .location-item-name-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:0.4rem;
  }

  .location-item-name-row span{
    font-size:0.9rem;
    color:var(--ink);
    line-height:1.3;
    word-break:break-word;
  }

  .location-item-card .qty-stepper{
    justify-content:center;
  }

  .item-pill{
    display:flex;
    align-items:center;
    gap:0.5rem;
    background:var(--card);
    border:1px solid var(--sand-dark);
    border-radius:999px;
    padding:0.55rem 1rem;
    font-size:0.9rem;
    color:var(--ink);
  }

  .item-pill span{
    white-space:nowrap;
  }

  .qty-stepper{
    display:flex;
    align-items:center;
    gap:0.35rem;
  }

  .qty-btn{
    width:1.6rem;
    height:1.6rem;
    border-radius:50%;
    border:none;
    background:var(--teal);
    color:#fff;
    font-weight:700;
    font-size:1rem;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
  }
  .qty-btn:hover{ background:var(--teal-dark); }
  .qty-btn:active{ transform:scale(0.94); }

  .item-pill .qty-input{
    width:3.4rem;
    text-align:center;
    border:1px solid var(--sand-dark);
    border-radius:999px;
    padding:0.25rem 0.3rem;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:0.85rem;
    color:var(--teal-dark);
    background:#fff;
    -moz-appearance:textfield;
    appearance:textfield;
  }
  .item-pill .qty-input::-webkit-inner-spin-button,
  .item-pill .qty-input::-webkit-outer-spin-button{
    -webkit-appearance:none;
    margin:0;
  }

  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(5,7,20,0.7);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:1.5rem;
  }

  .modal-card{
    background:var(--card);
    border-radius:12px;
    padding:1.8rem;
    max-width:340px;
    width:100%;
    box-shadow:0 12px 30px rgba(0,0,0,0.3);
  }

  .modal-card p{
    margin:0 0 1.4rem;
    color:var(--ink);
    font-size:0.95rem;
    line-height:1.4;
  }

  .modal-actions{
    display:flex;
    gap:0.6rem;
    justify-content:flex-end;
  }

  .modal-btn{
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:600;
    font-size:0.88rem;
    border:none;
    border-radius:6px;
    padding:0.55rem 1rem;
    cursor:pointer;
  }

  .modal-btn-cancel{
    background:var(--sand-dark);
    color:var(--ink);
  }
  .modal-btn-cancel:hover{ background:#3B4570; }

  .modal-btn-danger{
    background:var(--clay);
    color:#fff;
  }
  .modal-btn-danger:hover{ background:var(--clay-dark); }

  .modal-btn-primary{
    background:var(--teal);
    color:#fff;
  }
  .modal-btn-primary:hover{ background:var(--teal-dark); }

  .modal-input{
    width:100%;
    box-sizing:border-box;
    border:1px solid var(--sand-dark);
    border-radius:6px;
    padding:0.55rem 0.7rem;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:0.9rem;
    color:var(--teal-dark);
    background:#fff;
    margin:0 0 1.2rem;
  }

  .search-modal-card{
    max-width:440px;
    max-height:80vh;
    display:flex;
    flex-direction:column;
  }

  .search-modal-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:1rem;
  }

  .search-modal-head h3{
    font-family:'Fraunces', serif;
    font-size:1.2rem;
    margin:0;
    color:var(--ink);
  }

  .search-modal-results{
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:0.8rem;
  }

  .search-result-card{
    background:var(--sand);
    border:1px solid var(--sand-dark);
    border-radius:10px;
    padding:0.8rem 1rem;
  }

  .search-result-card h4{
    font-family:'Fraunces', serif;
    font-size:1rem;
    margin:0 0 0.5rem;
    color:var(--ink);
  }

  .search-result-card ul{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:0.3rem;
  }

  .search-result-card li{
    display:flex;
    justify-content:space-between;
    font-size:0.88rem;
    color:var(--ink);
  }

  .search-result-card .search-result-total{
    border-top:1px solid var(--sand-dark);
    margin-top:0.5rem;
    padding-top:0.4rem;
    font-weight:700;
    display:flex;
    justify-content:space-between;
    font-size:0.88rem;
  }

  .search-result-none{
    font-size:0.85rem;
    color:#7C88B8;
  }

  .item-search-suggestions{
    position:absolute;
    top:calc(100% + 0.3rem);
    left:0;
    right:0;
    background:var(--card);
    border:1px solid var(--sand-dark);
    border-radius:8px;
    max-height:220px;
    overflow-y:auto;
    z-index:50;
    box-shadow:0 8px 20px rgba(0,0,0,0.35);
  }

  .item-search-suggestion{
    padding:0.55rem 0.8rem;
    font-size:0.88rem;
    color:var(--ink);
    cursor:pointer;
  }
  .item-search-suggestion:hover{
    background:var(--sand-dark);
  }

  footer{
    text-align:center;
    color:#7C88B8;
    font-size:0.8rem;
    padding:1.5rem;
  }

  .login-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(180deg, var(--teal) 0%, var(--teal-dark) 100%);
    padding:1.5rem;
  }

  .login-card{
    background:var(--card);
    border-radius:12px;
    padding:2.4rem 2.2rem;
    max-width:360px;
    width:100%;
    text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
  }

  .login-card h1{
    font-family:'Fraunces', serif;
    font-size:1.8rem;
    margin:0 0 0.6rem;
    color:var(--ink);
  }

  .login-card p{
    color:#B7C2E8;
    font-size:0.95rem;
    margin:0 0 1.4rem;
  }

  .discord-btn{
    background:#5865F2;
    color:#fff;
    border:none;
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    padding:0.75rem 1.4rem;
    border-radius:8px;
    cursor:pointer;
    width:100%;
    transition:background 0.2s ease;
  }
  .discord-btn:hover{ background:#4752C4; }
  .discord-btn:disabled{ opacity:0.6; cursor:default; }

  .login-error{
    color:var(--clay-dark);
    font-size:0.85rem;
    margin:1rem 0 0 !important;
    min-height:1.2em;
  }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>Oasis Items Tracker</h1>
    <p>Log in with Discord to view and edit the tracker.</p>
    <button id="discord-login-btn" class="discord-btn">Log in with Discord</button>
    <p id="login-error" class="login-error"></p>
  </div>
</div>

<div id="confirm-modal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <p id="confirm-modal-message"></p>
    <div class="modal-actions">
      <button id="confirm-modal-cancel" class="modal-btn modal-btn-cancel">Cancel</button>
      <button id="confirm-modal-confirm" class="modal-btn modal-btn-danger">Delete</button>
    </div>
  </div>
</div>

<div id="prompt-modal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <p id="prompt-modal-message"></p>
    <input id="prompt-modal-input" type="text" class="modal-input">
    <div class="modal-actions">
      <button id="prompt-modal-cancel" class="modal-btn modal-btn-cancel">Cancel</button>
      <button id="prompt-modal-confirm" class="modal-btn modal-btn-primary">OK</button>
    </div>
  </div>
</div>

<div id="alert-modal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <p id="alert-modal-message"></p>
    <div class="modal-actions">
      <button id="alert-modal-ok" class="modal-btn modal-btn-primary">OK</button>
    </div>
  </div>
</div>

<div id="search-modal" class="modal-overlay" style="display:none;">
  <div class="modal-card search-modal-card">
    <div class="search-modal-head">
      <h3>Search Items</h3>
      <button id="search-modal-close" class="icon-btn">✕</button>
    </div>
    <input id="search-modal-input" type="text" class="modal-input" placeholder="Type an item name...">
    <div id="search-modal-results" class="search-modal-results"></div>
  </div>
</div>

<div id="app-content" style="display:none;">

<header class="banner">
  <img src="https://i.postimg.cc/rmG38G4L/Oasisnobg.png" alt="Oasis Tracker logo" class="banner-logo">
  <h1>Oasis Items Tracker</h1>
  <div class="dune"></div>
</header>

<main>
  <nav class="tabs" id="tabs"></nav>
  <div id="panels"></div>
</main>

<footer>
  Oasis Tracker &mdash; shared live for everyone with the required Discord role
  <br>
  <button id="logout-btn" class="icon-btn" style="text-decoration:underline; margin-top:0.4rem;">Log out</button>
</footer>

</div><!-- /#app-content -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://gpaqlehknskrcthyaapo.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwYXFsZWhrbnNrcmN0aHlhYXBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjQwMjEsImV4cCI6MjA5ODI0MDAyMX0.pVsGNoYVNsh6w0RTTCajtveVJ12wgxxgP1Vqhl2EOxQ";

  const OASIS_AUTH_FUNCTION_URL = "https://gpaqlehknskrcthyaapo.supabase.co/functions/v1/oasis-auth";
  const DISCORD_CLIENT_ID = "1523834823976681503";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CATALOG_TAB_ID = 'items';
  const TOTALS_TAB_ID = 'totals';

  let catalogRemoveMode = false;
  let catalogItems = [];    // [{id, name}]  -- master flat item list
  let locations = [];       // [{id, name, position}] -- location tabs, from the database
  let locationItems = {};   // { locationId: [{id (location_item row id), item_id, done, item:{id,name}}] }
  let activeTab = CATALOG_TAB_ID;
  let realtimeChannel = null;

  function showConfirmModal(message){
    return new Promise(resolve => {
      const overlay = document.getElementById('confirm-modal');
      const messageEl = document.getElementById('confirm-modal-message');
      const cancelBtn = document.getElementById('confirm-modal-cancel');
      const confirmBtn = document.getElementById('confirm-modal-confirm');

      messageEl.textContent = message;
      overlay.style.display = 'flex';

      function cleanup(result){
        overlay.style.display = 'none';
        cancelBtn.removeEventListener('click', onCancel);
        confirmBtn.removeEventListener('click', onConfirm);
        resolve(result);
      }
      function onCancel(){ cleanup(false); }
      function onConfirm(){ cleanup(true); }

      cancelBtn.addEventListener('click', onCancel);
      confirmBtn.addEventListener('click', onConfirm);
    });
  }

  function showPromptModal(message, defaultValue){
    return new Promise(resolve => {
      const overlay = document.getElementById('prompt-modal');
      const messageEl = document.getElementById('prompt-modal-message');
      const input = document.getElementById('prompt-modal-input');
      const cancelBtn = document.getElementById('prompt-modal-cancel');
      const confirmBtn = document.getElementById('prompt-modal-confirm');

      messageEl.textContent = message;
      input.value = defaultValue || '';
      overlay.style.display = 'flex';
      setTimeout(() => { input.focus(); input.select(); }, 0);

      function cleanup(result){
        overlay.style.display = 'none';
        cancelBtn.removeEventListener('click', onCancel);
        confirmBtn.removeEventListener('click', onConfirm);
        input.removeEventListener('keydown', onKeydown);
        resolve(result);
      }
      function onCancel(){ cleanup(null); }
      function onConfirm(){ cleanup(input.value); }
      function onKeydown(e){
        if(e.key === 'Enter') onConfirm();
        if(e.key === 'Escape') onCancel();
      }

      cancelBtn.addEventListener('click', onCancel);
      confirmBtn.addEventListener('click', onConfirm);
      input.addEventListener('keydown', onKeydown);
    });
  }

  function showAlertModal(message){
    return new Promise(resolve => {
      const overlay = document.getElementById('alert-modal');
      const messageEl = document.getElementById('alert-modal-message');
      const okBtn = document.getElementById('alert-modal-ok');

      messageEl.textContent = message;
      overlay.style.display = 'flex';

      function cleanup(){
        overlay.style.display = 'none';
        okBtn.removeEventListener('click', onOk);
        resolve();
      }
      function onOk(){ cleanup(); }

      okBtn.addEventListener('click', onOk);
    });
  }

  function openSearchModal(){
    const overlay = document.getElementById('search-modal');
    const input = document.getElementById('search-modal-input');
    const closeBtn = document.getElementById('search-modal-close');

    overlay.style.display = 'flex';
    input.value = '';
    renderSearchResults('');
    setTimeout(() => input.focus(), 0);

    function onInput(){ renderSearchResults(input.value); }
    function onClose(){
      overlay.style.display = 'none';
      input.removeEventListener('input', onInput);
      closeBtn.removeEventListener('click', onClose);
      overlay.removeEventListener('click', onOverlayClick);
      document.removeEventListener('keydown', onKeydown);
    }
    function onOverlayClick(e){
      if(e.target === overlay) onClose();
    }
    function onKeydown(e){
      if(e.key === 'Escape') onClose();
    }

    input.addEventListener('input', onInput);
    closeBtn.addEventListener('click', onClose);
    overlay.addEventListener('click', onOverlayClick);
    document.addEventListener('keydown', onKeydown);
  }

  function renderSearchResults(query){
    const resultsEl = document.getElementById('search-modal-results');
    resultsEl.innerHTML = '';

    const trimmed = query.trim().toLowerCase();

    if(trimmed === ''){
      const hint = document.createElement('div');
      hint.className = 'search-result-none';
      hint.textContent = 'Start typing to search for an item...';
      resultsEl.appendChild(hint);
      return;
    }

    const itemTotals = buildItemTotals();
    const matchingNames = catalogItems
      .filter(i => i.name.toLowerCase().includes(trimmed))
      .map(i => i.name);
    matchingNames.sort((a, b) => a.localeCompare(b));

    if(matchingNames.length === 0){
      const empty = document.createElement('div');
      empty.className = 'search-result-none';
      empty.textContent = 'No items match that search.';
      resultsEl.appendChild(empty);
      return;
    }

    matchingNames.forEach(name => {
      const entry = Object.values(itemTotals).find(e => e.name === name);
      const card = document.createElement('div');
      card.className = 'search-result-card';

      const h4 = document.createElement('h4');
      h4.textContent = name;
      card.appendChild(h4);

      if(!entry){
        const none = document.createElement('div');
        none.className = 'search-result-none';
        none.textContent = 'Not tracked at any location yet.';
        card.appendChild(none);
      }else{
        const ul = document.createElement('ul');
        entry.byLocation.forEach(loc => {
          const li = document.createElement('li');
          const nameSpan = document.createElement('span');
          nameSpan.textContent = loc.locationName;
          const qtySpan = document.createElement('span');
          qtySpan.textContent = loc.qty;
          li.appendChild(nameSpan);
          li.appendChild(qtySpan);
          ul.appendChild(li);
        });
        card.appendChild(ul);

        const totalRow = document.createElement('div');
        totalRow.className = 'search-result-total';
        const totalLabel = document.createElement('span');
        totalLabel.textContent = 'Total';
        const totalValue = document.createElement('span');
        totalValue.textContent = entry.total;
        totalRow.appendChild(totalLabel);
        totalRow.appendChild(totalValue);
        card.appendChild(totalRow);
      }

      resultsEl.appendChild(card);
    });
  }

  const loginScreen = document.getElementById('login-screen');
  const appContent = document.getElementById('app-content');
  const loginBtn = document.getElementById('discord-login-btn');
  const loginError = document.getElementById('login-error');
  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');

  const SESSION_KEY = 'oasis_session';

  loginBtn.addEventListener('click', () => {
    const authorizeUrl = `https://discord.com/oauth2/authorize?client_id=${encodeURIComponent(DISCORD_CLIENT_ID)}&redirect_uri=${encodeURIComponent(OASIS_AUTH_FUNCTION_URL)}&response_type=code&scope=identify%20guilds.members.read`;
    window.location.href = authorizeUrl;
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem(SESSION_KEY);
    showLoginScreen();
  });

  function decodeSessionPayload(token){
    try{
      const [payloadB64] = token.split('.');
      const padded = payloadB64.replace(/-/g, '+').replace(/_/g, '/');
      const json = atob(padded);
      return JSON.parse(json);
    }catch(e){
      return null;
    }
  }

  function getValidSession(){
    const token = sessionStorage.getItem(SESSION_KEY);
    if(!token) return null;
    const payload = decodeSessionPayload(token);
    if(!payload || !payload.exp || payload.exp < Date.now()){
      sessionStorage.removeItem(SESSION_KEY);
      return null;
    }
    return payload;
  }

  function showLoginScreen(message){
    loginScreen.style.display = 'flex';
    appContent.style.display = 'none';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Log in with Discord';
    loginError.textContent = message || '';
    if(realtimeChannel){
      sb.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }
  }

  function enterApp(){
    loginScreen.style.display = 'none';
    appContent.style.display = '';
    subscribeAndLoad();
  }

  function handleAuthRedirect(){
    if(window.location.hash.startsWith('#session=')){
      const token = decodeURIComponent(window.location.hash.slice('#session='.length));
      sessionStorage.setItem(SESSION_KEY, token);
      window.history.replaceState({}, document.title, window.location.pathname);
      return true;
    }
    const params = new URLSearchParams(window.location.search);
    if(params.has('auth')){
      const reason = params.get('auth');
      window.history.replaceState({}, document.title, window.location.pathname);
      if(reason === 'denied'){
        showLoginScreen("You don't have the required Discord role.");
      }else{
        showLoginScreen('Something went wrong logging in. Please try again.');
      }
      return false;
    }
    return null;
  }

  function init(){
    const redirectResult = handleAuthRedirect();
    const session = getValidSession();
    if(session){
      enterApp();
    }else if(redirectResult === null){
      showLoginScreen();
    }
  }

  // ---------- Data loading ----------

  async function loadCatalog(){
    const { data: rows, error } = await sb
      .from('oasis_items')
      .select('id, name, created_at')
      .order('created_at', { ascending: true });
    if(error){ console.error(error); return; }
    catalogItems = rows || [];
  }

  async function loadLocations(){
    const { data: rows, error } = await sb
      .from('oasis_locations')
      .select('id, name, position, rent_due')
      .order('position', { ascending: true });
    if(error){ console.error(error); return; }
    locations = rows || [];
  }

  async function loadLocationItems(){
    const { data: rows, error } = await sb
      .from('oasis_location_items')
      .select('id, location_id, item_id, quantity, oasis_items(id, name)')
      .order('created_at', { ascending: true });
    if(error){ console.error(error); return; }
    locationItems = {};
    locations.forEach(l => locationItems[l.id] = []);
    (rows || []).forEach(row => {
      if(!locationItems[row.location_id]) locationItems[row.location_id] = [];
      locationItems[row.location_id].push({
        id: row.id,
        item_id: row.item_id,
        quantity: row.quantity,
        item: row.oasis_items
      });
    });
  }

  async function loadAll(){
    await loadLocations();
    await Promise.all([loadCatalog(), loadLocationItems()]);
    render();
  }

  function subscribeAndLoad(){
    loadAll();
    if(realtimeChannel) return;
    realtimeChannel = sb.channel('oasis-tracker-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'oasis_items' }, loadAll)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'oasis_locations' }, loadAll)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'oasis_location_items' }, loadAll)
      .subscribe();
  }

  // ---------- Rendering ----------


  function render(){
    const allTabs = [
      { id: CATALOG_TAB_ID, label: 'Items' },
      { id: TOTALS_TAB_ID, label: 'Totals' },
      ...locations.map(l => ({ id: l.id, label: l.name }))
    ];

    tabsEl.innerHTML = '';
    allTabs.forEach(t => {
      const btn = document.createElement('button');
      btn.textContent = t.label;
      if(t.id === activeTab) btn.classList.add('active');
      btn.addEventListener('click', () => { activeTab = t.id; render(); });
      if(t.id !== CATALOG_TAB_ID && t.id !== TOTALS_TAB_ID){
        btn.title = 'Double-click to rename';
        btn.addEventListener('dblclick', () => renameLocation(t.id, t.label));
      }
      tabsEl.appendChild(btn);
    });

    const addTabBtn = document.createElement('button');
    addTabBtn.textContent = '+';
    addTabBtn.title = 'Add a new tab';
    addTabBtn.style.fontWeight = '700';
    addTabBtn.style.color = 'var(--teal)';
    addTabBtn.addEventListener('click', addLocation);
    tabsEl.appendChild(addTabBtn);

    const searchBtn = document.createElement('button');
    searchBtn.textContent = '🔍 Search';
    searchBtn.title = 'Search for an item';
    searchBtn.style.marginLeft = 'auto';
    searchBtn.style.color = 'var(--mint)';
    searchBtn.addEventListener('click', openSearchModal);
    tabsEl.appendChild(searchBtn);

    panelsEl.innerHTML = '';
    allTabs.forEach(t => {
      const panel = document.createElement('section');
      panel.className = 'panel' + (t.id === activeTab ? ' active' : '');
      if(t.id === CATALOG_TAB_ID){
        panel.appendChild(renderCatalogPanel());
      }else if(t.id === TOTALS_TAB_ID){
        panel.appendChild(renderTotalsPanel());
      }else{
        panel.appendChild(renderLocationPanel(t));
      }
      panelsEl.appendChild(panel);
    });
  }

  async function addLocation(){
    const name = await showPromptModal('Name for the new tab:', '');
    if(!name || !name.trim()) return;
    const nextPosition = locations.length > 0 ? Math.max(...locations.map(l => l.position)) + 1 : 0;
    const { error } = await sb.from('oasis_locations').insert({ name: name.trim(), position: nextPosition });
    if(error) showAlertModal('Could not add tab: ' + error.message);
  }

  async function renameLocation(locationId, currentName){
    const name = await showPromptModal('Rename tab:', currentName);
    if(!name || !name.trim() || name.trim() === currentName) return;
    const { error } = await sb.from('oasis_locations').update({ name: name.trim() }).eq('id', locationId);
    if(error) showAlertModal('Could not rename tab: ' + error.message);
  }

  async function updateRentDue(locationId, rentDue){
    const { error } = await sb.from('oasis_locations').update({ rent_due: rentDue }).eq('id', locationId);
    if(error) showAlertModal('Could not update rent due date: ' + error.message);
  }

  async function deleteLocation(locationId, locationLabel){
    const confirmed = await showConfirmModal(`Delete the "${locationLabel}" tab? This also removes all items and rent info tracked there.`);
    if(!confirmed) return;
    const { error } = await sb.from('oasis_locations').delete().eq('id', locationId);
    if(error){
      showAlertModal('Could not delete tab: ' + error.message);
      return;
    }
    if(activeTab === locationId){
      activeTab = CATALOG_TAB_ID;
    }
  }

  function renderCatalogPanel(){
    const wrap = document.createElement('div');

    const head = document.createElement('div');
    head.className = 'panel-head';
    const h2 = document.createElement('h2');
    h2.textContent = 'Items';
    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ Add Item';
    addBtn.addEventListener('click', addCatalogItem);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'add-btn';
    removeBtn.style.background = catalogRemoveMode ? 'var(--teal)' : 'var(--sand-dark)';
    removeBtn.style.color = catalogRemoveMode ? '#fff' : 'var(--ink)';
    removeBtn.textContent = catalogRemoveMode ? 'Done' : 'Remove Item';
    removeBtn.addEventListener('click', () => {
      catalogRemoveMode = !catalogRemoveMode;
      render();
    });

    const btnGroup = document.createElement('div');
    btnGroup.style.display = 'flex';
    btnGroup.style.gap = '0.5rem';
    btnGroup.appendChild(addBtn);
    btnGroup.appendChild(removeBtn);

    head.appendChild(h2);
    head.appendChild(btnGroup);
    wrap.appendChild(head);

    if(catalogItems.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No items yet. Click "Add Item" to start building your list.';
      wrap.appendChild(empty);
      return wrap;
    }

    const grid = document.createElement('div');
    grid.className = 'item-pill-grid';
    catalogItems.forEach(item => grid.appendChild(renderCatalogPill(item)));
    wrap.appendChild(grid);
    return wrap;
  }

  function renderCatalogPill(item){
    const pill = document.createElement('div');
    pill.className = 'item-pill';

    const span = document.createElement('span');
    span.textContent = item.name;
    pill.appendChild(span);

    if(catalogRemoveMode){
      const del = document.createElement('button');
      del.className = 'icon-btn';
      del.textContent = '✕';
      del.title = 'Delete item';
      del.addEventListener('click', () => deleteCatalogItem(item.id, item.name));
      pill.appendChild(del);
    }

    return pill;
  }

  // Build: itemId -> { name, byLocation: [{locationName, qty}], total }
  // Shared by the Totals tab and the search popup.
  function buildItemTotals(){
    const itemTotals = {};
    locations.forEach(loc => {
      (locationItems[loc.id] || []).forEach(entry => {
        if(!entry.item) return;
        const id = entry.item.id;
        if(!itemTotals[id]){
          itemTotals[id] = { name: entry.item.name, byLocation: [], total: 0 };
        }
        const qty = entry.quantity || 0;
        itemTotals[id].byLocation.push({ locationName: loc.name, qty });
        itemTotals[id].total += qty;
      });
    });
    return itemTotals;
  }

  function renderTotalsPanel(){
    const wrap = document.createElement('div');

    const head = document.createElement('div');
    head.className = 'panel-head';
    const h2 = document.createElement('h2');
    h2.textContent = 'Totals';
    head.appendChild(h2);
    wrap.appendChild(head);

    const itemTotals = buildItemTotals();

    const itemIds = Object.keys(itemTotals).sort((a, b) =>
      itemTotals[a].name.localeCompare(itemTotals[b].name)
    );

    if(itemIds.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'Nothing tracked yet. Add items to a location tab to see totals here.';
      wrap.appendChild(empty);
      return wrap;
    }

    const grid = document.createElement('div');
    grid.className = 'categories';

    let grandTotal = 0;
    itemIds.forEach(id => {
      const entry = itemTotals[id];
      grandTotal += entry.total;
      grid.appendChild(renderTotalsCard(entry));
    });
    wrap.appendChild(grid);

    const grandTotalRow = document.createElement('div');
    grandTotalRow.style.marginTop = '1.4rem';
    grandTotalRow.style.textAlign = 'right';
    grandTotalRow.style.fontFamily = "'Fraunces', serif";
    grandTotalRow.style.fontSize = '1.05rem';
    grandTotalRow.style.color = 'var(--ink)';
    grandTotalRow.textContent = `Grand Total (all items): ${grandTotal}`;
    wrap.appendChild(grandTotalRow);

    return wrap;
  }

  function renderTotalsCard(entry){
    const card = document.createElement('div');
    card.className = 'category';

    const top = document.createElement('div');
    top.className = 'category-top';
    const h3 = document.createElement('h3');
    h3.textContent = entry.name;
    top.appendChild(h3);
    card.appendChild(top);

    const ul = document.createElement('ul');
    ul.className = 'items';
    entry.byLocation.forEach(loc => {
      const li = document.createElement('li');
      const span = document.createElement('span');
      span.textContent = loc.locationName;
      const qtySpan = document.createElement('span');
      qtySpan.style.marginLeft = 'auto';
      qtySpan.style.fontWeight = '600';
      qtySpan.textContent = loc.qty;
      li.appendChild(span);
      li.appendChild(qtySpan);
      ul.appendChild(li);
    });
    card.appendChild(ul);

    const totalRow = document.createElement('div');
    totalRow.style.borderTop = '1px solid var(--sand-dark)';
    totalRow.style.marginTop = '0.4rem';
    totalRow.style.paddingTop = '0.5rem';
    totalRow.style.display = 'flex';
    totalRow.style.justifyContent = 'space-between';
    totalRow.style.fontWeight = '700';
    totalRow.style.fontSize = '0.9rem';
    const totalLabel = document.createElement('span');
    totalLabel.textContent = 'Total';
    const totalValue = document.createElement('span');
    totalValue.textContent = entry.total;
    totalRow.appendChild(totalLabel);
    totalRow.appendChild(totalValue);
    card.appendChild(totalRow);

    return card;
  }

  function renderLocationPanel(tab){
    const wrap = document.createElement('div');

    const head = document.createElement('div');
    head.className = 'panel-head';
    const h2 = document.createElement('h2');
    h2.textContent = tab.label;
    const deleteTabBtn = document.createElement('button');
    deleteTabBtn.className = 'add-btn';
    deleteTabBtn.style.background = 'var(--sand-dark)';
    deleteTabBtn.style.color = 'var(--ink)';
    deleteTabBtn.textContent = 'Delete Tab';
    deleteTabBtn.addEventListener('click', () => deleteLocation(tab.id, tab.label));
    head.appendChild(h2);
    head.appendChild(deleteTabBtn);
    wrap.appendChild(head);

    // Rent Due date for this location
    const location = locations.find(l => l.id === tab.id);
    const rentRow = document.createElement('div');
    rentRow.style.display = 'flex';
    rentRow.style.alignItems = 'center';
    rentRow.style.gap = '0.6rem';
    rentRow.style.marginBottom = '1.2rem';

    const rentLabel = document.createElement('span');
    rentLabel.textContent = 'Rent Due:';
    rentLabel.style.fontWeight = '600';
    rentLabel.style.color = 'var(--ink)';
    rentLabel.style.fontSize = '0.9rem';

    const rentInput = document.createElement('input');
    rentInput.type = 'date';
    rentInput.value = location && location.rent_due ? location.rent_due : '';
    rentInput.style.border = '1px solid var(--sand-dark)';
    rentInput.style.borderRadius = '6px';
    rentInput.style.padding = '0.4rem 0.5rem';
    rentInput.style.fontFamily = "'IBM Plex Sans', sans-serif";
    rentInput.style.fontSize = '0.85rem';
    rentInput.style.color = 'var(--teal-dark)';
    rentInput.style.background = '#fff';
    rentInput.addEventListener('change', () => {
      updateRentDue(tab.id, rentInput.value || null);
    });

    rentRow.appendChild(rentLabel);
    rentRow.appendChild(rentInput);
    wrap.appendChild(rentRow);

    // "Add item to this location" control -- searchable, pulled from the Items catalog
    const addRow = document.createElement('div');
    addRow.style.display = 'flex';
    addRow.style.gap = '0.5rem';
    addRow.style.marginBottom = '1.2rem';
    addRow.style.flexWrap = 'wrap';
    addRow.style.position = 'relative';

    const searchWrap = document.createElement('div');
    searchWrap.style.position = 'relative';
    searchWrap.style.flex = '1';
    searchWrap.style.minWidth = '200px';

    const searchInput = document.createElement('input');
    searchInput.type = 'text';
    searchInput.className = 'modal-input';
    searchInput.style.margin = '0';
    searchInput.style.width = '100%';

    const existingItemIds = new Set((locationItems[tab.id] || []).map(li => li.item_id));
    const available = catalogItems.filter(i => !existingItemIds.has(i.id));

    let selectedItemId = null;

    if(available.length === 0){
      searchInput.placeholder = catalogItems.length === 0
        ? 'Add items in the Items tab first'
        : 'All catalog items already added here';
      searchInput.disabled = true;
    }else{
      searchInput.placeholder = 'Search items...';
    }

    const suggestList = document.createElement('div');
    suggestList.className = 'item-search-suggestions';
    suggestList.style.display = 'none';

    function renderSuggestions(query){
      suggestList.innerHTML = '';
      const trimmed = query.trim().toLowerCase();
      const matches = trimmed === ''
        ? available
        : available.filter(i => i.name.toLowerCase().includes(trimmed));

      if(matches.length === 0){
        suggestList.style.display = 'none';
        return;
      }

      matches.forEach(i => {
        const opt = document.createElement('div');
        opt.className = 'item-search-suggestion';
        opt.textContent = i.name;
        opt.addEventListener('mousedown', e => {
          e.preventDefault();
          selectedItemId = i.id;
          searchInput.value = i.name;
          suggestList.style.display = 'none';
        });
        suggestList.appendChild(opt);
      });
      suggestList.style.display = 'block';
    }

    searchInput.addEventListener('focus', () => {
      if(!searchInput.disabled) renderSuggestions(searchInput.value);
    });
    searchInput.addEventListener('input', () => {
      selectedItemId = null;
      renderSuggestions(searchInput.value);
    });
    searchInput.addEventListener('blur', () => {
      setTimeout(() => { suggestList.style.display = 'none'; }, 100);
    });

    searchWrap.appendChild(searchInput);
    searchWrap.appendChild(suggestList);

    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ Add to ' + tab.label;
    addBtn.disabled = available.length === 0;
    addBtn.addEventListener('click', () => {
      let itemId = selectedItemId;
      if(!itemId){
        // Fall back to an exact (case-insensitive) name match if they typed
        // a full name without picking it from the suggestion list.
        const typed = searchInput.value.trim().toLowerCase();
        const match = available.find(i => i.name.toLowerCase() === typed);
        if(match) itemId = match.id;
      }
      if(!itemId){
        showAlertModal('Pick an item from the suggestions first.');
        return;
      }
      addItemToLocation(tab.id, itemId);
    });

    addRow.appendChild(searchWrap);
    addRow.appendChild(addBtn);
    wrap.appendChild(addRow);

    const items = locationItems[tab.id] || [];

    if(items.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No items tracked here yet. Add some from the list above.';
      wrap.appendChild(empty);
      return wrap;
    }

    const grid = document.createElement('div');
    grid.className = 'location-item-grid';
    items.forEach(entry => grid.appendChild(renderLocationPill(entry)));
    wrap.appendChild(grid);

    return wrap;
  }

  function renderLocationPill(entry){
    const card = document.createElement('div');
    card.className = 'location-item-card';

    const nameRow = document.createElement('div');
    nameRow.className = 'location-item-name-row';

    const span = document.createElement('span');
    span.textContent = entry.item ? entry.item.name : '(deleted item)';
    nameRow.appendChild(span);

    const rm = document.createElement('button');
    rm.className = 'icon-btn';
    rm.textContent = '✕';
    rm.title = 'Remove from this location';
    rm.addEventListener('click', () => removeItemFromLocation(entry.id));
    nameRow.appendChild(rm);

    card.appendChild(nameRow);

    const stepper = document.createElement('div');
    stepper.className = 'qty-stepper';

    const qty = document.createElement('input');
    qty.type = 'number';
    qty.className = 'qty-input';
    qty.min = '0';
    qty.value = entry.quantity ?? 0;

    function commitValue(val){
      if(isNaN(val) || val < 0) val = 0;
      qty.value = val;
      updateLocationItemQuantity(entry.id, val);
    }

    const minusBtn = document.createElement('button');
    minusBtn.className = 'qty-btn';
    minusBtn.type = 'button';
    minusBtn.textContent = '−';
    minusBtn.title = 'Decrease';
    minusBtn.addEventListener('click', () => {
      const current = parseInt(qty.value, 10) || 0;
      commitValue(current - 1);
    });

    const plusBtn = document.createElement('button');
    plusBtn.className = 'qty-btn';
    plusBtn.type = 'button';
    plusBtn.textContent = '+';
    plusBtn.title = 'Increase';
    plusBtn.addEventListener('click', () => {
      const current = parseInt(qty.value, 10) || 0;
      commitValue(current + 1);
    });

    qty.addEventListener('change', () => {
      commitValue(parseInt(qty.value, 10));
    });

    stepper.appendChild(minusBtn);
    stepper.appendChild(qty);
    stepper.appendChild(plusBtn);
    card.appendChild(stepper);

    return card;
  }

  // ---------- Mutations: catalog ----------

  async function addCatalogItem(){
    const name = await showPromptModal('Item name:', '');
    if(!name || !name.trim()) return;
    const { error } = await sb.from('oasis_items').insert({ name: name.trim() });
    if(error) showAlertModal('Could not add item: ' + error.message);
  }

  async function deleteCatalogItem(itemId, itemName){
    const confirmed = await showConfirmModal(`Delete "${itemName}" from the catalog? This also removes it from any location tracking it.`);
    if(!confirmed) return;
    const { error } = await sb.from('oasis_items').delete().eq('id', itemId);
    if(error) showAlertModal('Could not delete item: ' + error.message);
  }

  // ---------- Mutations: per-location tracking ----------

  async function addItemToLocation(locationId, itemId){
    const { error } = await sb.from('oasis_location_items').insert({ location_id: locationId, item_id: itemId });
    if(error) showAlertModal('Could not add item to this location: ' + error.message);
  }

  async function updateLocationItemQuantity(rowId, quantity){
    const { error } = await sb.from('oasis_location_items').update({ quantity }).eq('id', rowId);
    if(error) showAlertModal('Could not update quantity: ' + error.message);
  }

  async function removeItemFromLocation(rowId){
    const { error } = await sb.from('oasis_location_items').delete().eq('id', rowId);
    if(error) showAlertModal('Could not remove item: ' + error.message);
  }

  init();
</script>

</body>
</html>
